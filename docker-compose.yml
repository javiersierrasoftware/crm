version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: creatix-crm-app
    restart: always
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/creatix_crm
      - APP_URL=http://localhost
      - PORT=3000
    depends_on:
      - mongodb

  mongodb:
    image: mongo:6.0
    container_name: creatix-crm-db
    restart: always
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db

  nginx:
    image: nginx:alpine
    container_name: creatix-crm-nginx
    restart: always
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app

volumes:
  mongodb_data:
